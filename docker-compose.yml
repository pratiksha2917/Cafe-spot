services:
  backend:
    build: ./backend
    container_name: cafespot-backend
    restart: unless-stopped
    environment:
      - SECRET_KEY=cafespot-super-secret-change-in-production
      - GOOGLE_API_KEY=AIzaSyBBH5WNN660-YNrkQnGopV8y4cPOatnwNw
      - DB_PATH=/app/data/cafespot.db
    volumes:
      - cafespot_data:/app/data
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: cafespot-frontend
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  cafespot_data:
