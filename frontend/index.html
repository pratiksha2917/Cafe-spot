<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeSpot — Find Sydney Cafes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-brand">
            <div class="brand-logo">☕</div>
            <h1>CafeSpot</h1>
            <p>Discover the best cafes in Sydney</p>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Sign In</button>
                <button class="auth-tab" data-tab="register">Create Account</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-pw">
                        <input type="password" id="loginPassword" placeholder="Your password" required autocomplete="current-password">
                        <button type="button" class="pw-toggle" data-target="loginPassword">👁</button>
                    </div>
                </div>
                <div class="form-error" id="loginError"></div>
                <button type="submit" class="btn-auth" id="loginBtn">Sign In</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" placeholder="e.g. coffeeaddict" required minlength="3" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <div class="input-pw">
                        <input type="password" id="regPassword" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
                        <button type="button" class="pw-toggle" data-target="regPassword">👁</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regConfirm">Confirm Password</label>
                    <div class="input-pw">
                        <input type="password" id="regConfirm" placeholder="Repeat password" required autocomplete="new-password">
                        <button type="button" class="pw-toggle" data-target="regConfirm">👁</button>
                    </div>
                </div>
                <div class="form-error" id="registerError"></div>
                <button type="submit" class="btn-auth" id="registerBtn">Create Account</button>
            </form>
        </div>

        <p class="auth-footer">Sydney cafes, sorted by distance from you.</p>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Redirect if already logged in
        if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

        // Tab switching
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab, .auth-form').forEach(el => el.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
            });
        });

        // Password visibility toggle
        document.querySelectorAll('.pw-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                input.type = input.type === 'password' ? 'text' : 'password';
            });
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');
            err.textContent = '';
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            try {
                await Auth.login(
                    document.getElementById('loginEmail').value,
                    document.getElementById('loginPassword').value
                );
                window.location.href = '/dashboard.html';
            } catch (ex) {
                err.textContent = ex.message;
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });

        // Register
        document.getElementById('registerForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const err = document.getElementById('registerError');
            err.textContent = '';
            const pw  = document.getElementById('regPassword').value;
            const cfm = document.getElementById('regConfirm').value;
            if (pw !== cfm) { err.textContent = 'Passwords do not match.'; return; }
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            try {
                await Auth.register(
                    document.getElementById('regUsername').value,
                    document.getElementById('regEmail').value,
                    pw
                );
                window.location.href = '/dashboard.html';
            } catch (ex) {
                err.textContent = ex.message;
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
